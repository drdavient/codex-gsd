services:
  codex:
    build: .
    container_name: codex-gsd
    tty: true
    stdin_open: true

    user: "${UID}:${GID}"

    environment:
      - CODEX_HOME=/codex

    volumes:
      - ${LOGSEQ_VAULT_PATH}:/workspace
      - codex-state:/codex

    working_dir: /workspace

volumes:
  codex-state: