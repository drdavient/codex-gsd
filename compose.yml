services:
  codex:
    build: .
    container_name: codex-gsd
    tty: true
    stdin_open: true

    environment:
      - CODEX_HOME=/codex
      - PUID=${UID}
      - PGID=${GID}

    volumes:
      - ${LOGSEQ_VAULT_PATH}:/workspace
      - codex-state:/codex

    working_dir: /workspace

volumes:
  codex-state: