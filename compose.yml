# docker-compose.yml
services:
  codex:
    build: .
    container_name: codex-gsd
    tty: true
    stdin_open: true

    environment:
      - CODEX_HOME=/codex
      - HOME=/codex
      - NPM_CONFIG_CACHE=/tmp/npm-cache
      - PUID=${UID}
      - PGID=${GID}

    volumes:
      - ${LOGSEQ_VAULT_PATH}:/workspace
      - codex-state:/codex

    working_dir: /workspace

    tmpfs:
      - /tmp

volumes:
  codex-state: