services:
  codex:
    build: .
    container_name: codex-gsd
    tty: true
    stdin_open: true

    user: "${UID}:${GID}"

    environment:
      - CODEX_HOME=/workspace/.codex

    volumes:
      - codex-home:/workspace/.codex
      - ${LOGSEQ_VAULT_PATH}:/workspace

    working_dir: /workspace

volumes:
  codex-home: